wait_patient: 10
feat_dim: 768
freeze_bert_parameters: True
save_model: True

llm_ood: true
llm_model: 'deepseek-v3:671b-gw'
llm_api_base: 'https://uni-api.cstcloud.cn/v1'
llm_api_key: ""
llm_batch: 4
llm_temperature: 0.0
output_dir: "./outputs/openset/adb-llm" 
save_results_path: "results/openset/adb-llm"
